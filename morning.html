<!DOCTYPE html>
<html>
<head>
<title>Morning Mail 💌</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffe5ec,#fff8e7);
    font-family:Arial, sans-serif;
    text-align:center;
}

.mail{
    background:white;
    padding:35px;
    border-radius:25px;
    width:80%;
    max-width:350px;
    box-shadow:0 10px 30px #ddd;
}

button{
    background:#ff7fa8;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.message{
    display:none;
    margin-top:25px;
    line-height:1.6;
    color:#555;
}

.heart{
    font-size:40px;
}
</style>

</head>

<body>

<div class="mail">

<div class="heart">💌</div>

<h2>You've Got Morning Mail</h2>

<button onclick="openMail()">Open Me ✨</button>

<div class="message" id="msg">

<h3>☀️ Good Morning</h3>

<p>
Before your day gets busy,
I wanted to leave you a tiny reminder...
</p>

<p>
Someone is cheering for you,
thinking about you,
and hoping you have the most beautiful day.
</p>

<p>
Now go smile. The world needs that smile ❤️
</p>

</div>

</div>


<script>

function openMail(){
document.querySelector("button").innerHTML="📬 Mail Delivered";
document.getElementById("msg").style.display="block";
}

</script>

</body>
</html>
